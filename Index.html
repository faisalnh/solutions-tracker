        :root {

            --mws-danger-soft: #fff0ef;

        body {

        body::before {

            inset: 0;
            pointer-events: none;
            opacity: .32;
            background-image: radial-gradient(rgba(63, 97, 73, .18) .65px, transparent .65px);
            background-size: 18px 18px;

        button, input, select, textarea { font: inherit; }

        .app-shell { width: min(1220px, calc(100% - 32px)); margin: 0 auto; padding: 18px 0 64px; position: relative; }

        .brand-mark {

        }
        .brand-copy strong { display: block; font-family: "Plus Jakarta Sans", sans-serif; font-size: .98rem; }
        .brand-copy span { display: block; color: var(--mws-muted); font-size: .78rem; margin-top: 1px; }
        .topbar-actions { display: flex; align-items: center; gap: 10px; }
        .language-picker {

            background: rgba(255,255,255,.82); border: 1px solid var(--mws-border); border-radius: 999px;
            box-shadow: 0 6px 18px rgba(45,68,51,.06); backdrop-filter: blur(12px);
        }
        .language-option {
            min-width: 43px; min-height: 34px; border: 0; border-radius: 999px; padding: 7px 11px;
            background: transparent; color: var(--mws-muted); font-family: "Plus Jakarta Sans", sans-serif;
            font-size: .75rem; font-weight: 800; transition: .18s ease;
        }
        .language-option.active { color: white; background: var(--mws-sage-800); box-shadow: 0 5px 14px rgba(63,97,73,.2); }

        .hero {
            position: relative; overflow: hidden; display: grid; grid-template-columns: minmax(0, 1.45fr) minmax(310px, .55fr);
            min-height: 430px; border-radius: var(--mws-radius-xl); background: var(--mws-sage-900);
            color: white; box-shadow: var(--mws-shadow-lg); isolation: isolate;
        }
        .hero::before {
            content: ""; position: absolute; width: 540px; height: 540px; border: 1px solid rgba(255,255,255,.09);
            border-radius: 50%; right: -190px; top: -245px; box-shadow: 0 0 0 58px rgba(255,255,255,.025), 0 0 0 116px rgba(255,255,255,.018); z-index: -1;
        }
        .hero-main { padding: clamp(34px, 6vw, 70px); display: flex; flex-direction: column; justify-content: center; align-items: flex-start; }
        .eyebrow {
            display: inline-flex; align-items: center; gap: 8px; padding: 8px 12px; border-radius: 999px;
            color: var(--mws-sage-100); background: rgba(255,255,255,.09); border: 1px solid rgba(255,255,255,.12);
            font-family: "Plus Jakarta Sans", sans-serif; font-size: .74rem; font-weight: 800; letter-spacing: .09em; text-transform: uppercase;
        }
        .eyebrow-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--mws-gold-400); box-shadow: 0 0 0 4px rgba(215,168,79,.13); }
        .hero h1 { max-width: 780px; margin: 20px 0 18px; font-size: clamp(2.45rem, 5.8vw, 5.35rem); line-height: .98; }
        .hero-description { max-width: 670px; color: rgba(255,255,255,.72); font-size: 1.08rem; line-height: 1.72; }
        .hero-actions { display: flex; flex-wrap: wrap; gap: 11px; margin-top: 12px; }
        .hero-aside { padding: 28px; display: flex; align-items: flex-end; }
        .overview-card {
            width: 100%; padding: 24px; border: 1px solid rgba(255,255,255,.14); border-radius: var(--mws-radius-lg);
            background: rgba(255,255,255,.09); backdrop-filter: blur(16px); box-shadow: inset 0 1px rgba(255,255,255,.08);
        }
        .overview-head { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 18px; }
        .overview-head strong { font-family: "Plus Jakarta Sans", sans-serif; font-size: .95rem; }
        .live-badge { display: inline-flex; align-items: center; gap: 6px; color: rgba(255,255,255,.72); font-size: .76rem; font-weight: 800; }
        .live-badge::before { content: ""; width: 7px; height: 7px; border-radius: 50%; background: #a9d4a7; box-shadow: 0 0 0 4px rgba(169,212,167,.12); }
        .stat-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 10px; }
        .stat { min-height: 94px; padding: 15px; border-radius: var(--mws-radius-md); background: rgba(255,255,255,.075); border: 1px solid rgba(255,255,255,.1); }
        .stat strong { display: block; font-family: "Plus Jakarta Sans", sans-serif; font-size: 1.85rem; line-height: 1; }
        .stat span { display: block; margin-top: 9px; color: rgba(255,255,255,.62); font-size: .79rem; }

        .btn {
            display: inline-flex; min-height: 44px; align-items: center; justify-content: center; gap: 8px;
            padding: 10px 17px; border: 1px solid transparent; border-radius: 999px; text-decoration: none;
            font-family: "Plus Jakarta Sans", sans-serif; font-size: .86rem; font-weight: 800;
            transition: transform .16s ease, box-shadow .16s ease, background .16s ease, border-color .16s ease;
        }
        .btn:hover:not(:disabled) { transform: translateY(-2px); }
        .btn:disabled { cursor: not-allowed; opacity: .62; }
        .btn-primary { color: white; background: var(--mws-sage-800); box-shadow: 0 10px 22px rgba(63,97,73,.24); }
        .btn-primary:hover:not(:disabled) { background: var(--mws-sage-700); }
        .btn-gold { color: #3d2a0c; background: var(--mws-gold-400); box-shadow: 0 11px 25px rgba(215,168,79,.18); }
        .btn-light { color: white; background: rgba(255,255,255,.1); border-color: rgba(255,255,255,.18); }
        .btn-outline { color: var(--mws-sage-800); background: white; border-color: var(--mws-border); box-shadow: 0 6px 18px rgba(45,68,51,.06); }
        .btn-soft { color: var(--mws-sage-800); background: var(--mws-sage-100); }
        .btn-icon { width: 18px; height: 18px; flex: 0 0 auto; }

        .workspace { margin-top: 22px; display: grid; grid-template-columns: 230px minmax(0, 1fr); gap: 18px; align-items: start; }
        .sidebar {
            position: sticky; top: 18px; padding: 11px; border-radius: var(--mws-radius-lg); background: rgba(255,255,255,.84);
            border: 1px solid var(--mws-border); box-shadow: var(--mws-shadow-md); backdrop-filter: blur(16px);
        }
        .nav-label { padding: 10px 12px 7px; color: var(--mws-muted); font-size: .69rem; font-weight: 800; letter-spacing: .1em; text-transform: uppercase; }
        .tab {
            width: 100%; min-height: 50px; display: flex; align-items: center; gap: 11px; margin: 3px 0; padding: 10px 13px;
            border: 0; border-radius: 13px; color: var(--mws-muted); background: transparent; text-align: left;
            font-family: "Plus Jakarta Sans", sans-serif; font-size: .84rem; font-weight: 800; transition: .18s ease;
        }
        .tab:hover { color: var(--mws-sage-800); background: var(--mws-sage-50); }
        .tab.active { color: white; background: var(--mws-sage-800); box-shadow: 0 9px 20px rgba(63,97,73,.2); }
        .tab .btn-icon { width: 19px; height: 19px; }
        .sidebar-note { margin-top: 11px; padding: 14px; border-radius: 13px; background: var(--mws-gold-100); color: #75531e; font-size: .78rem; line-height: 1.5; }

        .content { min-width: 0; }
        .panel {
            padding: clamp(22px, 4vw, 38px); border-radius: var(--mws-radius-xl); background: rgba(255,255,255,.9);
            border: 1px solid var(--mws-border); box-shadow: var(--mws-shadow-md); backdrop-filter: blur(16px);
        }
        .panel-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 20px; margin-bottom: 28px; }
        .panel-heading { display: flex; gap: 15px; align-items: flex-start; }
        .heading-icon { width: 45px; height: 45px; flex: 0 0 auto; display: grid; place-items: center; border-radius: 14px; color: var(--mws-sage-800); background: var(--mws-sage-100); }
        .heading-icon .btn-icon { width: 22px; height: 22px; }
        .panel-header h2 { font-size: clamp(1.45rem, 3vw, 2rem); }
        .panel-header p { max-width: 680px; margin: 7px 0 0; color: var(--mws-muted); line-height: 1.58; }
        .admin-chip { display: inline-flex; margin-bottom: 8px; color: var(--mws-gold-600); font-size: .7rem; font-weight: 800; letter-spacing: .1em; text-transform: uppercase; }

        .alert { display: flex; gap: 10px; align-items: flex-start; margin-bottom: 18px; padding: 14px 16px; border: 1px solid var(--mws-sage-300); border-radius: var(--mws-radius-md); color: var(--mws-sage-800); background: var(--mws-sage-100); font-weight: 700; }
        .alert.error { color: #8c3433; border-color: #efc2c0; background: var(--mws-danger-soft); }
        .alert .btn-icon { margin-top: 1px; }

        .section-title { display: flex; align-items: center; gap: 12px; margin: 30px 0 17px; padding-top: 28px; border-top: 1px solid var(--mws-border); font-size: 1.03rem; }
        .section-title:first-of-type { margin-top: 0; padding-top: 0; border-top: 0; }
        .section-number { width: 29px; height: 29px; display: grid; place-items: center; border-radius: 9px; color: var(--mws-sage-800); background: var(--mws-sage-100); font-size: .78rem; letter-spacing: 0; }
        .form-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 18px; }
        .field.full { grid-column: 1 / -1; }
        label { display: block; margin-bottom: 7px; color: var(--mws-ink); font-family: "Plus Jakarta Sans", sans-serif; font-size: .82rem; font-weight: 800; }
        .required { color: var(--mws-danger); }
        input, select, textarea {
            width: 100%; min-height: 48px; padding: 12px 14px; border: 1px solid var(--mws-border); border-radius: var(--mws-radius-sm);
            color: var(--mws-ink); background: #fff; outline: none; transition: border-color .16s ease, box-shadow .16s ease, background .16s ease;
        }
        textarea { min-height: 118px; resize: vertical; line-height: 1.55; }
        input:hover, select:hover, textarea:hover { border-color: var(--mws-sage-300); }
        input:focus, select:focus, textarea:focus { border-color: var(--mws-sage-500); box-shadow: 0 0 0 4px rgba(139,168,136,.15); }
        .helper { margin-top: 6px; color: var(--mws-muted); font-size: .8rem; line-height: 1.45; }
        .form-actions { display: flex; flex-wrap: wrap; align-items: center; gap: 13px; margin-top: 27px; padding-top: 22px; border-top: 1px solid var(--mws-border); }
        .form-actions .helper { margin: 0; max-width: 470px; }

        .toolbar { display: flex; align-items: center; justify-content: space-between; gap: 14px; margin-bottom: 20px; padding: 13px; border-radius: var(--mws-radius-md); background: var(--mws-sage-50); border: 1px solid var(--mws-border); }
        .toolbar-controls { flex: 1; display: grid; grid-template-columns: minmax(190px, 1fr) 160px 150px; gap: 9px; }
        .toolbar input, .toolbar select { min-height: 43px; padding-top: 9px; padding-bottom: 9px; font-size: .86rem; }
        .result-count { white-space: nowrap; color: var(--mws-muted); font-size: .78rem; font-weight: 700; }
        .requests-grid { display: grid; gap: 13px; }
        .request-card { position: relative; overflow: hidden; padding: 21px; border-radius: var(--mws-radius-lg); background: white; border: 1px solid var(--mws-border); transition: transform .18s ease, box-shadow .18s ease, border-color .18s ease; }
        .request-card::before { content: ""; position: absolute; left: 0; top: 0; bottom: 0; width: 4px; background: var(--mws-sage-500); opacity: .7; }
        .request-card:hover { transform: translateY(-2px); border-color: var(--mws-sage-300); box-shadow: 0 13px 28px rgba(45,68,51,.09); }
        .request-card-header { display: flex; justify-content: space-between; gap: 16px; align-items: flex-start; }
        .request-card h3 { margin-top: 11px; font-size: 1.12rem; line-height: 1.3; }

        .request-meta { margin-top: 7px; color: var(--mws-muted); font-size: .82rem; }
        .meta-dot { color: var(--mws-sage-300); }
        .pill { display: inline-flex; align-items: center; gap: 6px; width: fit-content; padding: 6px 9px; border-radius: 999px; color: var(--mws-sage-800); background: var(--mws-sage-100); font-size: .72rem; font-weight: 800; }
        .pill.gold { color: #7b5720; background: var(--mws-gold-100); }
        .pill.red { color: #8f3433; background: var(--mws-danger-soft); }
        .pill.neutral { color: var(--mws-muted); background: #f1f3f0; }
        .status-line { margin-top: 5px; font-size: .82rem; }
        .status-line strong { font-family: "Plus Jakarta Sans", sans-serif; }
        .status-line span:not(.helper) { color: var(--mws-muted); }
        .status-line .helper { margin: 0 0 0 auto; }
        .progress { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 7px; margin-top: 14px; }
        .progress-step { height: 7px; border-radius: 999px; background: #e4ebe1; }
        .progress-step.done { background: var(--mws-sage-700); }
        .progress-step.warning { background: var(--mws-gold-400); }
        .progress-step.rejected { background: var(--mws-danger); }
        .loading, .empty-state { padding: 46px 24px; border: 1px dashed var(--mws-sage-300); border-radius: var(--mws-radius-lg); color: var(--mws-muted); text-align: center; background: var(--mws-sage-50); }
        .empty-icon { width: 52px; height: 52px; margin: 0 auto 14px; display: grid; place-items: center; border-radius: 17px; color: var(--mws-sage-800); background: var(--mws-sage-100); }
        .empty-state h3 { color: var(--mws-ink); margin-bottom: 8px; }
        .empty-state p { margin: 0; }

        .modal-backdrop { position: fixed; inset: 0; z-index: 50; display: flex; align-items: center; justify-content: center; padding: 20px; background: rgba(25,41,31,.58); backdrop-filter: blur(7px); }
        .modal-card { width: min(900px, 100%); max-height: min(89vh, 960px); overflow: auto; padding: clamp(22px, 4vw, 34px); border-radius: var(--mws-radius-xl); background: white; border: 1px solid rgba(255,255,255,.6); box-shadow: 0 30px 90px rgba(18,32,23,.3); }
        .detail-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 12px; margin-top: 22px; }
        .detail-item { padding: 15px; border: 1px solid var(--mws-border); border-radius: var(--mws-radius-md); background: var(--mws-sage-50); }
        .detail-item.full { grid-column: 1 / -1; }
        .detail-label { color: var(--mws-muted); font-size: .68rem; font-weight: 800; letter-spacing: .075em; text-transform: uppercase; }
        .detail-value { margin-top: 7px; line-height: 1.52; white-space: pre-wrap; overflow-wrap: anywhere; }

        @media (max-width: 960px) {
            .hero { grid-template-columns: 1fr; }
            .hero-aside { padding-top: 0; }
            .workspace { grid-template-columns: 1fr; }
            .sidebar { position: static; display: flex; gap: 6px; overflow-x: auto; }
            .nav-label, .sidebar-note { display: none; }
            .tab { width: auto; min-width: max-content; padding-right: 16px; }
            .toolbar { align-items: stretch; flex-direction: column; }
            .toolbar-controls { grid-template-columns: 1fr 1fr; }
            .toolbar-controls input { grid-column: 1 / -1; }
        }
        @media (max-width: 680px) {
            .app-shell { width: min(100% - 20px, 1220px); padding-top: 10px; }
            .brand-copy span { display: none; }
            .topbar { min-height: 56px; }
            .hero-main { padding: 34px 23px; }
            .hero-aside { padding: 0 17px 17px; }
            .hero h1 { font-size: clamp(2.35rem, 13vw, 3.5rem); }
            .hero-actions, .hero-actions .btn { width: 100%; }
            .form-grid, .detail-grid { grid-template-columns: 1fr; }
            .field.full, .detail-item.full { grid-column: auto; }
            .panel-header, .request-card-header { flex-direction: column; align-items: stretch; }
            .panel-header > .btn, .request-card-header > .btn { width: 100%; }
            .panel { padding: 21px 16px; }
            .panel-heading { gap: 11px; }
            .heading-icon { width: 39px; height: 39px; border-radius: 12px; }
            .toolbar-controls { grid-template-columns: 1fr; }
            .toolbar-controls input { grid-column: auto; }
            .status-line .helper { width: 100%; margin-left: 0; }
            .form-actions .btn { width: 100%; }
            .modal-backdrop { padding: 10px; }
            .modal-card { border-radius: 22px; }
        }
    </style>
</head>
