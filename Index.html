                --mws-radius-lg: 28px;
                --mws-radius-md: 18px;
                --mws-radius-sm: 12px;
            }

            * {
                box-sizing: border-box;
            }

            body {
                margin: 0;
                min-height: 100vh;
                color: var(--mws-color-text-primary);
                background:
                    radial-gradient(
                        circle at top left,
                        rgba(139, 168, 136, 0.24),
                        transparent 34rem
                    ),
                    linear-gradient(
                        135deg,
                        #fbf8ef 0%,
                        var(--mws-color-surface-page) 44%,
                        #edf5ec 100%
                    );
                font-family:
                    "Nunito Sans",
                    system-ui,
                    -apple-system,
                    BlinkMacSystemFont,
                    "Segoe UI",
                    sans-serif;
            }

            button,
            input,
            select,
            textarea {
                font: inherit;
            }

            button {
                cursor: pointer;
            }

            .app-shell {
                width: min(1180px, calc(100% - 32px));
                margin: 0 auto;
                padding: 32px 0 56px;
            }

            .hero {

                gap: 24px;
                align-items: stretch;
                margin-bottom: 24px;
            }

            .hero-card,
            .panel,
            .request-card,
            .empty-state,
            .modal-card {

                border: 1px solid rgba(220, 231, 217, 0.9);
                border-radius: var(--mws-radius-lg);
                box-shadow: var(--mws-shadow-card);
                backdrop-filter: blur(18px);
            }

            .hero-card {
                padding: clamp(28px, 5vw, 48px);
                position: relative;
                overflow: hidden;
            }

            .hero-card::after {
                content: "";
                position: absolute;
                width: 220px;
                height: 220px;
                right: -76px;
                bottom: -92px;
                border-radius: 999px;
                background: rgba(215, 168, 79, 0.22);
            }

            .kicker {
                display: inline-flex;
                align-items: center;
                gap: 8px;
                padding: 8px 12px;
                border-radius: 999px;
                background: var(--mws-color-brand-primary-soft);
                color: var(--mws-color-brand-primary-strong);
                font-family: "Plus Jakarta Sans", sans-serif;
                font-size: 0.78rem;
                font-weight: 800;
                letter-spacing: 0.08em;
                text-transform: uppercase;
            }

            h1,
            h2,
            h3 {
                margin: 0;
                font-family: "Plus Jakarta Sans", sans-serif;
                letter-spacing: -0.035em;
            }

            h1 {
                max-width: 780px;
                margin-top: 18px;
                font-size: clamp(2.2rem, 5vw, 4.8rem);
                line-height: 0.98;
            }

            .hero p {
                max-width: 720px;
                color: var(--mws-color-text-secondary);
                font-size: 1.08rem;
                line-height: 1.7;
            }

            .hero-actions,
            .tabs,
            .toolbar,
            .form-actions,
            .request-meta,
            .status-line,
            .pill-row {
                display: flex;
                flex-wrap: wrap;
                gap: 12px;
                align-items: center;
            }

            .stats-card {
                padding: 24px;
                display: grid;
                gap: 16px;
            }

            .stat-grid {
                display: grid;
                grid-template-columns: repeat(2, minmax(0, 1fr));
                gap: 12px;
            }

            .stat {
                padding: 16px;
                border-radius: var(--mws-radius-md);
                background: var(--mws-color-surface-raised);
                border: 1px solid var(--mws-color-border);
            }

            .stat strong {
                display: block;
                font-family: "Plus Jakarta Sans", sans-serif;
                font-size: 1.8rem;
            }

            .stat span {
                color: var(--mws-color-text-secondary);
                font-size: 0.85rem;
            }

            .btn {
                display: inline-flex;
                min-height: 44px;
                align-items: center;
                justify-content: center;
                gap: 8px;
                border-radius: 999px;
                border: 1px solid transparent;
                padding: 11px 18px;
                font-family: "Plus Jakarta Sans", sans-serif;
                font-weight: 800;
                text-decoration: none;
                transition:
                    transform 160ms ease,
                    box-shadow 160ms ease,
                    background 160ms ease;
            }

            .btn:hover:not(:disabled) {
                transform: translateY(-1px);
            }

            .btn:disabled {
                cursor: not-allowed;
                opacity: 0.65;
            }

            .btn-primary {
                color: #fff;
                background: var(--mws-color-brand-primary-strong);
                box-shadow: 0 12px 22px rgba(95, 127, 97, 0.28);
            }

            .btn-outline {
                color: var(--mws-color-brand-primary-strong);
                background: rgba(255, 255, 255, 0.72);
                border-color: var(--mws-color-border);
            }

            .btn-soft {
                color: var(--mws-color-brand-primary-strong);
                background: var(--mws-color-brand-primary-soft);
            }

            .tabs {
                margin: 24px 0;
                padding: 6px;
                width: fit-content;
                border-radius: 999px;
                background: rgba(255, 255, 255, 0.75);
                border: 1px solid var(--mws-color-border);
            }

            .tab {
                border: 0;
                color: var(--mws-color-text-secondary);
                background: transparent;
            }

            .tab.active {
                color: #fff;
                background: var(--mws-color-brand-primary-strong);
            }

            .panel {
                padding: clamp(20px, 4vw, 34px);
            }

            .panel-header {
                display: flex;
                justify-content: space-between;
                gap: 16px;
                align-items: flex-start;
                margin-bottom: 24px;
            }

            .panel-header p {
                margin: 8px 0 0;
                color: var(--mws-color-text-secondary);
            }

            .section-title {
                margin: 28px 0 16px;
                padding-top: 24px;
                border-top: 1px solid var(--mws-color-border);
            }

            .section-title:first-of-type {
                margin-top: 0;
                padding-top: 0;
                border-top: 0;
            }

            .form-grid {
                display: grid;
                grid-template-columns: repeat(2, minmax(0, 1fr));
                gap: 18px;
            }

            .field.full {
                grid-column: 1 / -1;
            }

            label {
                display: block;
                margin-bottom: 8px;
                color: var(--mws-color-text-primary);
                font-family: "Plus Jakarta Sans", sans-serif;
                font-size: 0.9rem;
                font-weight: 800;

            .required {
                color: var(--mws-color-danger);
            }

            input,
            select,
            textarea {
                width: 100%;
                border: 1px solid var(--mws-color-border);
                border-radius: var(--mws-radius-sm);
                color: var(--mws-color-text-primary);
                background: rgba(255, 255, 255, 0.92);
                padding: 13px 14px;
                outline: none;

                box-shadow: 0 0 0 4px rgba(139, 168, 136, 0.18);

            .alert {

                background: #fff1f1;
                border-color: #f3c7c7;

                flex-wrap: wrap;
                gap: 10px;
            }

            .toolbar select {
                width: auto;
                min-width: 210px;
            }

                display: grid;
                gap: 16px;
            }

            .request-card {
                padding: 20px;

                color: var(--mws-color-text-muted);
                font-size: 0.9rem;

            }

                color: #8f3433;
                background: #fff1f1;
            }

                margin-top: 16px;

            }

                    align-items: stretch;

                .toolbar select,
                .btn {
                    width: 100%;
                }

                .tabs {
                    width: 100%;
                }

                }
            }
